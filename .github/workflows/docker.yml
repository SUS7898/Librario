name: Build and push Docker image

# main 브랜치에 push 될 때마다 이미지를 빌드해 Docker Hub 에 올립니다.
# (수동 실행도 가능: Actions 탭 → 이 워크플로 → Run workflow)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE: dntmd7898/librario     # <아이디>/<이미지이름> — 바꾸려면 여기만 수정

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      # arm64 이미지를 x86 러너에서 빌드하기 위한 QEMU 에뮬레이션
      - name: QEMU 설정
        uses: docker/setup-qemu-action@v3

      - name: Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 태그 규칙: latest + 커밋 해시(짧은 버전) 두 개를 붙입니다.
      - name: 메타데이터(태그) 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: 멀티아키텍처 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # DS423(ARM64) / DS423+(x86_64) 모두 커버
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

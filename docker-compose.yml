# =============================================================================
# Librario · Portainer 스택 (Docker Hub 이미지 pull 방식)
# 이미지는 GitHub Actions 가 빌드해 Docker Hub(dntmd7898/librario)에 올립니다.
# NAS 는 빌드하지 않고 완성된 이미지를 받기만 합니다.
#
# 이 파일은 저장소 보관용 "참조본"입니다. 실제 배포는 Portainer(Web editor)에
# 붙여넣어 사용하고, 책 폴더 경로는 그쪽에서 직접 매핑하세요(경로를 저장소에 남기지 않음).
# =============================================================================
services:
  librario:
    image: dntmd7898/librario:latest
    container_name: librario
    restart: unless-stopped

    ports:
      - "8680:8080"          # 호스트:컨테이너 (역방향 프록시가 8680 을 가리킴)

    environment:
      SECRET_KEY: "${SECRET_KEY:-change-me-to-a-long-random-string-32chars+}"
      TZ: "Asia/Seoul"
      COOKIE_SECURE: "false" # HTTPS(역방향 프록시) 전용이면 "true"
      SCAN_ON_STARTUP: "true"
      SCHEDULER_ENABLED: "true"

    volumes:
      - librario-data:/data
      # ↓ 실제 책 폴더는 Portainer 에서 직접 매핑하세요(:ro 읽기전용 권장). 예:
      # - /volume1/Tier/Tier_2/Comic:/Comic:ro
      # - /volume1/Tier/Tier_2/Novel:/Novel:ro
      # - /volume1/Tier/Tier_2/문학:/Book:ro

volumes:
  librario-data:
